services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    # The app talks to the db service on the compose network.
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    # Entrypoint waits for the DB, runs `alembic upgrade head` (schema + seed),
    # then starts the bot. So `docker compose up` is the only command needed.
    command: ["bot"]

volumes:
  pgdata:
